<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RepLog - Today</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "on-secondary": "#2d3038",
                "error-container": "#93000a",
                "secondary": "#c4c6d0",
                "secondary-fixed": "#e0e2ec",
                "on-secondary-fixed": "#191c23",
                "on-error": "#690005",
                "secondary-container": "#44474f",
                "on-secondary-container": "#b3b5be",
                "on-primary": "#3e2e00",
                "on-primary-fixed-variant": "#594400",
                "on-background": "#e3e2e6",
                "surface-bright": "#38393c",
                "primary-fixed": "#ffdf95",
                "tertiary-fixed": "#b8eaff",
                "surface-variant": "#343538",
                "on-secondary-fixed-variant": "#44474f",
                "error": "#ffb4ab",
                "inverse-surface": "#e3e2e6",
                "surface": "#121316",
                "outline-variant": "#4e4634",
                "tertiary-fixed-dim": "#63d4fa",
                "primary": "#ffe5aa",
                "surface-container-lowest": "#0d0e11",
                "surface-container-low": "#1b1b1f",
                "on-surface": "#e3e2e6",
                "on-tertiary-fixed-variant": "#004d61",
                "on-primary-fixed": "#251a00",
                "on-tertiary-container": "#005e74",
                "surface-tint": "#f0c03e",
                "on-tertiary": "#003544",
                "tertiary-container": "#69d9ff",
                "primary-container": "#f5c542",
                "secondary-fixed-dim": "#c4c6d0",
                "on-primary-container": "#6b5200",
                "surface-container-high": "#292a2d",
                "inverse-on-surface": "#303034",
                "primary-fixed-dim": "#f0c03e",
                "inverse-primary": "#765a00",
                "surface-container": "#1f1f23",
                "background": "#121316",
                "outline": "#9a907b",
                "surface-container-highest": "#343538",
                "on-error-container": "#ffdad6",
                "on-surface-variant": "#d1c5ae",
                "tertiary": "#c5eeff",
                "surface-dim": "#121316",
                "on-tertiary-fixed": "#001f28"
        },
        "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
        },
        "spacing": {
                "base": "4px",
                "lg": "24px",
                "xs": "8px",
                "container-margin": "16px",
                "xl": "32px",
                "md": "16px",
                "sm": "12px",
                "gutter": "12px"
        },
        "fontFamily": {
                "body-lg": ["Inter"],
                "display-lg": ["Inter"],
                "headline-md": ["Inter"],
                "body-md": ["Inter"],
                "data-lg": ["Inter"],
                "headline-sm": ["Inter"],
                "label-md": ["Inter"]
        },
        "fontSize": {
                "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                "data-lg": ["20px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
        }
      }
    }
  }
</script>
<style>
  body {
    background-color: theme('colors.background');
    color: theme('colors.on-background');
    -webkit-font-smoothing: antialiased;
  }
  .glass-card {
    background: rgba(24, 27, 34, 0.6);
    backdrop-filter: blur(12px);
    border: 1px solid theme('colors.surface-container-highest');
  }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="pb-24">
<!-- TopAppBar (Hidden on mobile, showing desktop variant if needed, but per rules, mobile uses bottom nav. Assuming mobile-first view here based on prompt) -->
<header class="hidden md:flex justify-between items-center h-14 w-full px-md bg-surface dark:bg-surface border-b border-outline-variant dark:border-outline-variant sticky top-0 z-40">
<div class="flex items-center gap-4">
<button class="text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors active:opacity-70 transition-opacity p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-display-lg text-display-lg font-bold text-primary dark:text-primary">RepLog</h1>
</div>
<button class="text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors active:opacity-70 transition-opacity p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Mobile Header Replacement -->
<div class="md:hidden pt-lg pb-md px-container-margin">
<h1 class="font-display-lg text-display-lg text-primary">Today</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Fast, offline strength logging.</p>
</div>
<main class="px-container-margin md:mt-lg max-w-3xl mx-auto flex flex-col gap-lg">
<!-- Primary Action Button -->
<button class="w-full bg-primary-container text-on-primary-container h-16 rounded-xl flex items-center justify-center gap-3 active:scale-[0.98] transition-transform shadow-[0_4px_14px_0_rgba(245,197,66,0.15)] relative overflow-hidden group">
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
<span class="material-symbols-outlined font-bold text-[28px]" data-icon="fitness_center" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
<span class="font-headline-sm text-headline-sm tracking-tight">Start empty workout</span>
</button>
<!-- Bento Grid / Cards Section -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-sm">
<!-- Last Workout Card -->
<div class="glass-card rounded-xl p-md flex flex-col gap-sm relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full blur-2xl -translate-y-1/2 translate-x-1/4"></div>
<div class="flex justify-between items-start z-10">
<div>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block mb-1">Last workout</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Chest &amp; Triceps</h3>
</div>
<span class="font-label-md text-label-md text-primary bg-primary/10 px-2 py-1 rounded">2 days ago</span>
</div>
<div class="flex gap-md z-10 mt-2">
<div class="flex items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="timer">timer</span>
<span class="font-body-md text-body-md">45m</span>
</div>
<div class="flex items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="bar_chart">bar_chart</span>
<span class="font-body-md text-body-md">4500kg vol</span>
</div>
</div>
<button class="mt-2 text-primary font-label-md text-label-md flex items-center gap-1 self-start active:opacity-70">
        View details
        <span class="material-symbols-outlined text-[16px]" data-icon="chevron_right">chevron_right</span>
</button>
</div>
<!-- Suggested Next Card -->
<div class="glass-card rounded-xl p-md flex flex-col gap-sm relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-tertiary-container/5 rounded-full blur-2xl -translate-y-1/2 translate-x-1/4"></div>
<div class="flex justify-between items-start z-10">
<div>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block mb-1">Suggested next</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Leg Day</h3>
</div>
<button class="text-on-surface-variant p-1 rounded-full hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="more_horiz">more_horiz</span>
</button>
</div>
<div class="flex gap-md z-10 mt-2">
<div class="flex items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="format_list_bulleted">format_list_bulleted</span>
<span class="font-body-md text-body-md">4 exercises</span>
</div>
<div class="flex items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="schedule">schedule</span>
<span class="font-body-md text-body-md">~60m</span>
</div>
</div>
<button class="mt-2 bg-surface-container-highest text-on-surface font-label-md text-label-md h-10 rounded-lg flex items-center justify-center gap-2 active:bg-surface-container-high transition-colors w-full z-10">
<span class="material-symbols-outlined text-[18px]" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
        Start Routine
      </button>
</div>
</div>
<!-- Recent Activity Mini Chart (Atmospheric extra) -->
<div class="mt-4 opacity-60">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider block mb-sm">Activity Sparkline</span>
<div class="flex items-end gap-1 h-12 w-full max-w-[200px]">
<div class="w-1/6 bg-surface-container-highest rounded-t-sm h-[20%]"></div>
<div class="w-1/6 bg-surface-container-highest rounded-t-sm h-[60%]"></div>
<div class="w-1/6 bg-surface-container-highest rounded-t-sm h-[40%]"></div>
<div class="w-1/6 bg-surface-container-highest rounded-t-sm h-[100%]"></div>
<div class="w-1/6 bg-primary/40 rounded-t-sm h-[30%]"></div>
<div class="w-1/6 bg-primary rounded-t-sm h-[80%] relative">
<div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[10px] text-primary">Now</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center h-16 px-container-margin bg-surface-container/80 backdrop-blur-md border-t border-outline-variant dark:border-outline-variant z-50">
<!-- Active Tab: Today -->
<button class="flex flex-col items-center justify-center text-primary dark:text-primary border-t-2 border-primary pt-1 w-1/4 h-full active:scale-95 transition-transform duration-150 group">
<span class="material-symbols-outlined mb-1" data-icon="fitness_center" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
<span class="font-label-md text-label-md text-[10px]">Today</span>
</button>
<!-- Inactive Tab: Routines -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant pt-1 w-1/4 h-full active:scale-95 transition-transform duration-150 hover:bg-surface-container-high dark:hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined mb-1 group-hover:text-on-surface transition-colors" data-icon="assignment">assignment</span>
<span class="font-label-md text-label-md text-[10px] opacity-0 group-hover:opacity-100 transition-opacity">Routines</span>
</button>
<!-- Inactive Tab: History -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant pt-1 w-1/4 h-full active:scale-95 transition-transform duration-150 hover:bg-surface-container-high dark:hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined mb-1 group-hover:text-on-surface transition-colors" data-icon="history">history</span>
<span class="font-label-md text-label-md text-[10px] opacity-0 group-hover:opacity-100 transition-opacity">History</span>
</button>
<!-- Inactive Tab: Profile -->
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant pt-1 w-1/4 h-full active:scale-95 transition-transform duration-150 hover:bg-surface-container-high dark:hover:bg-surface-container-high transition-colors group">
<span class="material-symbols-outlined mb-1 group-hover:text-on-surface transition-colors" data-icon="person">person</span>
<span class="font-label-md text-label-md text-[10px] opacity-0 group-hover:opacity-100 transition-opacity">Profile</span>
</button>
</nav>
</body></html>
