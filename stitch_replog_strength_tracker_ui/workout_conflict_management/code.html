<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col items-center justify-center relative font-body-lg overflow-hidden">
<!-- Dimmed Background Overlay -->
<div class="absolute inset-0 bg-black/60 z-40 transition-opacity duration-300"></div>
<!-- Modal Container -->
<div class="z-50 bg-surface rounded-xl w-full max-w-[360px] mx-container-margin border border-surface-container-high shadow-2xl flex flex-col overflow-hidden animate-[slideUp_0.3s_ease-out]">
<!-- Grabber handle for mobile feel -->
<div class="w-full flex justify-center pt-xs pb-base bg-surface">
<div class="w-12 h-1 bg-surface-container-highest rounded-full"></div>
</div>
<!-- Modal Header & Icon -->
<div class="px-lg pt-sm pb-md flex flex-col items-center text-center">
<div class="w-12 h-12 rounded-full bg-error-container/20 flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-error-container text-[28px] icon-fill">warning</span>
</div>
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-xs">Workout already in progress</h2>
<p class="font-body-md text-body-md text-on-surface-variant">
                You have an active session for '<span class="text-on-surface font-semibold">Upper Body Power</span>'. Discard it or resume?
            </p>
</div>
<!-- Actions -->
<div class="px-lg pb-lg flex flex-col gap-sm mt-xs">
<!-- Primary Action: Resume -->
<button class="w-full h-12 bg-primary-container text-on-primary-container font-headline-sm text-headline-sm rounded-lg flex items-center justify-center transition-colors hover:bg-primary-fixed-dim active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-surface">
                Resume current
            </button>
<!-- Secondary Action: Start New (Destructive/Caution) -->
<button class="w-full h-12 bg-transparent border border-outline-variant text-error font-headline-sm text-headline-sm rounded-lg flex items-center justify-center transition-colors hover:bg-error-container/10 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-error focus:ring-offset-2 focus:ring-offset-surface">
                Start new
            </button>
<!-- Tertiary Action: Cancel -->
<button class="w-full h-12 bg-transparent text-on-surface-variant font-headline-sm text-headline-sm rounded-lg flex items-center justify-center transition-colors hover:bg-surface-container-highest active:scale-[0.98] focus:outline-none">
                Cancel
            </button>
</div>
</div>
<!-- Background Mockup Content (Blurred behind overlay) -->
<div class="absolute inset-0 z-0 flex flex-col p-container-margin gap-md opacity-30 filter blur-sm pointer-events-none">
<div class="h-14 flex items-center justify-between border-b border-surface-container-high pb-sm">
<div class="w-32 h-6 bg-surface-container-highest rounded"></div>
<div class="w-8 h-8 bg-surface-container-highest rounded-full"></div>
</div>
<div class="w-full h-48 bg-surface-container rounded-xl"></div>
<div class="w-full h-24 bg-surface-container rounded-xl"></div>
<div class="w-full h-24 bg-surface-container rounded-xl"></div>
</div>
<script>
        // Simple animation logic placeholder
        document.addEventListener('DOMContentLoaded', () => {
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideUp {
                    from { transform: translateY(20px); opacity: 0; }
                    to { transform: translateY(0); opacity: 1; }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body></html>
