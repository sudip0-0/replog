<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RepLog - Exercise Notes</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                      "on-primary": "#3e2e00",
                      "on-primary-fixed-variant": "#594400",
                      "on-background": "#e3e2e6",
                      "surface-bright": "#38393c",
                      "primary-fixed": "#ffdf95",
                      "tertiary-fixed": "#b8eaff",
                      "surface-variant": "#343538",
                      "on-secondary-fixed-variant": "#44474f",
                      "error": "#ffb4ab",
                      "inverse-surface": "#e3e2e6",
                      "surface": "#121316",
                      "outline-variant": "#4e4634",
                      "tertiary-fixed-dim": "#63d4fa",
                      "primary": "#ffe5aa",
                      "surface-container-lowest": "#0d0e11",
                      "surface-container-low": "#1b1b1f",
                      "on-surface": "#e3e2e6",
                      "on-tertiary-fixed-variant": "#004d61",
                      "on-primary-fixed": "#251a00",
                      "on-tertiary-container": "#005e74",
                      "surface-tint": "#f0c03e",
                      "on-tertiary": "#003544",
                      "tertiary-container": "#69d9ff",
                      "primary-container": "#f5c542",
                      "secondary-fixed-dim": "#c4c6d0",
                      "on-primary-container": "#6b5200",
                      "surface-container-high": "#292a2d",
                      "inverse-on-surface": "#303034",
                      "primary-fixed-dim": "#f0c03e",
                      "inverse-primary": "#765a00",
                      "surface-container": "#1f1f23",
                      "background": "#121316",
                      "outline": "#9a907b",
                      "surface-container-highest": "#343538",
                      "on-error-container": "#ffdad6",
                      "on-surface-variant": "#d1c5ae",
                      "tertiary": "#c5eeff",
                      "surface-dim": "#121316",
                      "on-tertiary-fixed": "#001f28"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "base": "4px",
                      "lg": "24px",
                      "xs": "8px",
                      "container-margin": "16px",
                      "xl": "32px",
                      "md": "16px",
                      "sm": "12px",
                      "gutter": "12px"
              },
              "fontFamily": {
                      "body-lg": [
                              "Inter"
                      ],
                      "display-lg": [
                              "Inter"
                      ],
                      "headline-md": [

                      "body-md": [

              },
              "fontSize": {

                      "data-lg": [

                      "label-md": [

                                      "letterSpacing": "0.05em",

              }
            }
          }
        }
    </script>
<style>
        body {
            background-color: #090A0D;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        /* Modal Overlay Background */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background font-body-lg antialiased h-screen w-screen overflow-hidden relative">
<!-- Background Context (Blurred out app behind the modal) -->
<div class="absolute inset-0 z-0 flex flex-col pointer-events-none opacity-40 blur-sm">
<!-- TopAppBar Placeholder -->
<header class="flex justify-between items-center h-14 w-full px-md bg-surface dark:bg-surface border-b border-outline-variant dark:border-outline-variant">
<button class="text-primary dark:text-primary active:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-display-lg text-display-lg font-bold text-primary dark:text-primary">RepLog</h1>
<button class="text-primary dark:text-primary active:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<main class="flex-1 p-md overflow-y-auto no-scrollbar pb-24">
<div class="mb-sm bg-[#181B22] border border-[#252A33] rounded p-md">
<h2 class="font-headline-sm text-headline-sm mb-xs">Barbell Bench Press</h2>
<div class="flex items-center gap-xs text-on-surface-variant font-body-md text-body-md mb-md">
<span>Target: 3 sets x 8-10 reps</span>
</div>
</div>
<div class="mb-sm bg-[#181B22] border border-[#252A33] rounded p-md">
<h2 class="font-headline-sm text-headline-sm mb-xs">Incline Dumbbell Press</h2>
<div class="flex items-center gap-xs text-on-surface-variant font-body-md text-body-md mb-md">
<span>Target: 3 sets x 10-12 reps</span>
</div>
</div>
</main>
</div>
<!-- Modal Overlay -->
<div class="absolute inset-0 z-40 modal-overlay flex flex-col justify-end">
<!-- Bottom Sheet Modal Container -->
<div class="bg-[#121419] w-full rounded-t-[16px] border-t border-[#252A33] flex flex-col max-h-[795px] shadow-2xl transform transition-transform duration-300 ease-out translate-y-0 relative">
<!-- Grabber Handle -->
<div class="w-full flex justify-center pt-xs pb-sm cursor-grab active:cursor-grabbing">
<div class="w-12 h-1 bg-[#252A33] rounded-full"></div>
</div>
<!-- Modal Header -->
<div class="px-md pb-md border-b border-[#252A33] flex justify-between items-center">
<h2 class="font-headline-md text-headline-md text-on-surface">Exercise Notes</h2>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="close">close</span>
</button>
</div>
<!-- Modal Body (Scrollable) -->
<div class="px-md py-md flex-1 overflow-y-auto no-scrollbar flex flex-col gap-lg">
<!-- Input Group: Machine Settings -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Machine settings</label>
<textarea class="w-full bg-surface border border-[#252A33] rounded px-sm py-sm font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-[#4e4634] resize-none" placeholder="e.g., Seat at 4, Pad at 2..." rows="2"></textarea>
</div>
<!-- Input Group: Grip -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Grip</label>
<input class="w-full h-12 bg-surface border border-[#252A33] rounded px-sm font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-[#4e4634]" placeholder="e.g., Thumbless, wide, neutral..." type="text"/>
</div>
<!-- Input Group: Stance -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Stance</label>
<input class="w-full h-12 bg-surface border border-[#252A33] rounded px-sm font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-[#4e4634]" placeholder="e.g., Shoulder width, toes out..." type="text"/>
</div>
<!-- Input Group: Injury Caution -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-error flex items-center gap-base uppercase tracking-wider">
<span class="material-symbols-outlined text-[16px]" data-icon="warning">warning</span>
                        Injury caution
                    </label>
<textarea class="w-full bg-surface border border-[#252A33] rounded px-sm py-sm font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-[#4e4634] resize-none" placeholder="Notes on pain or previous injuries to watch..." rows="2"></textarea>
</div>
<!-- Input Group: Substitutions -->
<div class="flex flex-col gap-base pb-xl">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Substitutions</label>
<textarea class="w-full bg-surface border border-[#252A33] rounded px-sm py-sm font-body-lg text-body-lg text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-[#4e4634] resize-none" placeholder="Alternatives if equipment is busy..." rows="2"></textarea>
</div>
</div>
<!-- Modal Footer (Action Buttons) -->
<div class="px-md py-md border-t border-[#252A33] bg-[#121419] flex gap-sm mt-auto mb-safe">
<button class="flex-1 h-12 rounded bg-surface border border-[#252A33] text-on-surface font-headline-sm text-headline-sm active:bg-surface-container transition-colors flex items-center justify-center">
                    Cancel
                </button>
<button class="flex-1 h-12 rounded bg-primary-container text-[#121316] font-headline-sm text-headline-sm active:opacity-80 transition-opacity flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[20px]" data-icon="save" style="font-variation-settings: 'FILL' 1;">save</span>
                    Save Notes
                </button>
</div>
</div>
</div>
</body></html>
