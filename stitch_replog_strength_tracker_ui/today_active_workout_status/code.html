<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RepLog - Today</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary": "#2d3038",
                    "error-container": "#93000a",
                    "secondary": "#c4c6d0",
                    "secondary-fixed": "#e0e2ec",
                    "on-secondary-fixed": "#191c23",
                    "on-error": "#690005",
                    "secondary-container": "#44474f",
                    "on-secondary-container": "#b3b5be",
                    "on-primary": "#3e2e00",
                    "on-primary-fixed-variant": "#594400",
                    "on-background": "#e3e2e6",
                    "surface-bright": "#38393c",
                    "primary-fixed": "#ffdf95",
                    "tertiary-fixed": "#b8eaff",
                    "surface-variant": "#343538",
                    "on-secondary-fixed-variant": "#44474f",
                    "error": "#ffb4ab",
                    "inverse-surface": "#e3e2e6",
                    "surface": "#121316",
                    "outline-variant": "#4e4634",
                    "tertiary-fixed-dim": "#63d4fa",
                    "primary": "#ffe5aa",
                    "surface-container-lowest": "#0d0e11",
                    "surface-container-low": "#1b1b1f",
                    "on-surface": "#e3e2e6",
                    "on-tertiary-fixed-variant": "#004d61",
                    "on-primary-fixed": "#251a00",
                    "on-tertiary-container": "#005e74",
                    "surface-tint": "#f0c03e",
                    "on-tertiary": "#003544",
                    "tertiary-container": "#69d9ff",
                    "primary-container": "#f5c542",
                    "secondary-fixed-dim": "#c4c6d0",
                    "on-primary-container": "#6b5200",
                    "surface-container-high": "#292a2d",
                    "inverse-on-surface": "#303034",
                    "primary-fixed-dim": "#f0c03e",
                    "inverse-primary": "#765a00",
                    "surface-container": "#1f1f23",
                    "background": "#121316",
                    "outline": "#9a907b",
                    "surface-container-highest": "#343538",
                    "on-error-container": "#ffdad6",
                    "on-surface-variant": "#d1c5ae",
                    "tertiary": "#c5eeff",
                    "surface-dim": "#121316",
                    "on-tertiary-fixed": "#001f28"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "base": "4px",
                    "lg": "24px",
                    "xs": "8px",
                    "container-margin": "16px",
                    "xl": "32px",
                    "md": "16px",
                    "sm": "12px",
                    "gutter": "12px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "display-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-md": ["Inter"],
                    "data-lg": ["Inter"],
                    "headline-sm": ["Inter"],
                    "label-md": ["Inter"]
            },
            "fontSize": {
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "data-lg": ["20px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}]
            }
          }
        }
      }
    </script>
<style>
        body {
            background-color: #090A0D; /* Base Level from Style Guidance */
            color: #e3e2e6; /* on-surface */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="antialiased min-h-screen flex flex-col pb-24 font-body-lg text-body-lg">
<!-- TopAppBar -->
<header class="bg-surface text-primary font-headline-sm text-headline-sm docked full-width top-0 border-b border-outline-variant flat no shadows flex justify-between items-center h-14 w-full px-md sticky z-40">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-highest transition-colors active:opacity-70 transition-opacity cursor-pointer">arrow_back</span>
<span class="font-display-lg text-display-lg font-bold text-primary">RepLog</span>
</div>
<span class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-highest transition-colors active:opacity-70 transition-opacity cursor-pointer">more_vert</span>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-margin py-lg flex flex-col gap-sm max-w-2xl mx-auto w-full">
<!-- Active Workout Card -->
<section class="bg-[#181B22] border border-[#252A33] rounded-xl p-md flex flex-col gap-md relative overflow-hidden">
<!-- Subtle gradient indicator for active state -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary-container to-primary-container/30"></div>
<div class="flex justify-between items-start">
<div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-1">Workout in progress</h2>
<p class="font-body-md text-body-md text-primary-container font-semibold">Upper Body Power</p>
</div>
<div class="flex items-center gap-1 text-on-surface-variant bg-surface-container-high px-2 py-1 rounded-full">
<span class="material-symbols-outlined text-[16px]">timer</span>
<span class="font-label-md text-label-md">24:00</span>
</div>
</div>
<div class="grid grid-cols-2 gap-xs bg-surface-container-lowest p-sm rounded-lg">
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Exercises</span>
<span class="font-data-lg text-data-lg text-on-surface">3</span>
</div>
<div class="flex flex-col border-l border-outline-variant pl-xs">
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Sets</span>
<span class="font-data-lg text-data-lg text-on-surface">8</span>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-headline-sm text-headline-sm py-3 rounded-lg flex items-center justify-center gap-2 active:scale-[0.98] transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                Resume Workout
            </button>
<div class="flex gap-sm mt-1">
<button class="flex-1 bg-surface-container-high text-on-surface font-body-md text-body-md py-2 rounded-lg border border-outline-variant hover:bg-surface-container-highest transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">add</span>
                    Add Exercise
                </button>
<button class="flex-1 bg-surface-container-high text-on-surface font-body-md text-body-md py-2 rounded-lg border border-outline-variant hover:bg-surface-container-highest transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[18px]">save</span>
                    Finish Later
                </button>
</div>
</section>
<h3 class="font-headline-sm text-headline-sm text-on-surface-variant mt-lg mb-xs">Today's Plan</h3>
<!-- Routine Card (Dimmed indicating it's paused for the active workout) -->
<div class="bg-surface-container border border-surface-container-highest rounded-xl p-md flex items-center justify-between opacity-50 cursor-not-allowed">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">fitness_center</span>
</div>
<div>
<h4 class="font-headline-sm text-headline-sm text-on-surface">Leg Day Hypertrophy</h4>
<p class="font-body-md text-body-md text-on-surface-variant">Scheduled for today</p>
</div>
</div>
<span class="material-symbols-outlined text-on-surface-variant">chevron_right</span>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-surface-container text-primary font-label-md text-label-md fixed bottom-0 w-full z-50 flat no shadows fixed bottom-0 left-0 w-full flex justify-around items-center h-16 px-container-margin bg-surface-container/80 backdrop-blur-md border-t border-outline-variant hidden md:hidden flex">
<!-- Today (Active) -->
<a class="flex flex-col items-center justify-center text-primary border-t-2 border-primary pt-1 hover:bg-surface-container-high transition-colors active:scale-95 transition-transform duration-150 w-full h-full" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
<span class="mt-1">Today</span>
</a>
<!-- Routines (Inactive) -->
<a class="flex flex-col items-center justify-center text-on-surface-variant pt-1 hover:bg-surface-container-high transition-colors active:scale-95 transition-transform duration-150 w-full h-full" href="#">
<span class="material-symbols-outlined">assignment</span>
<!-- Label hidden for inactive states as per style guidance to reduce clutter, though JSON says to include it. Balancing JSON vs Style guide: JSON says "label_texts": [...], but Style says "Labels are 10px, only visible for the active state". We'll keep them but visually deemphasized. -->
<span class="mt-1 opacity-0 h-0 overflow-hidden">Routines</span>
</a>
<!-- History (Inactive) -->
<a class="flex flex-col items-center justify-center text-on-surface-variant pt-1 hover:bg-surface-container-high transition-colors active:scale-95 transition-transform duration-150 w-full h-full" href="#">
<span class="material-symbols-outlined">history</span>
<span class="mt-1 opacity-0 h-0 overflow-hidden">History</span>
</a>
<!-- Profile (Inactive) -->
<a class="flex flex-col items-center justify-center text-on-surface-variant pt-1 hover:bg-surface-container-high transition-colors active:scale-95 transition-transform duration-150 w-full h-full" href="#">
<span class="material-symbols-outlined">person</span>
<span class="mt-1 opacity-0 h-0 overflow-hidden">Profile</span>
</a>
</nav>
</body></html>
