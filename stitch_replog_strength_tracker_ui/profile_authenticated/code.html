    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body-lg min-h-screen flex flex-col pt-14 pb-16">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface font-headline-sm text-headline-sm border-b border-outline-variant dark:border-outline-variant flex justify-between items-center h-14 w-full px-md fixed top-0 z-50">
<button class="text-primary dark:text-primary active:opacity-70 transition-opacity hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<span class="font-display-lg text-display-lg font-bold text-primary dark:text-primary">Profile</span>
<button class="text-primary dark:text-primary active:opacity-70 transition-opacity hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors rounded-full p-2 flex items-center justify-center">
<span class="material-symbols-outlined">more_vert</span>
</button>
</header>
<main class="flex-1 px-container-margin py-lg space-y-xl overflow-y-auto">
<!-- Account Section -->
<section class="bg-surface-container rounded-xl border border-surface-container-highest p-md flex flex-col gap-sm">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Account</h2>
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface font-headline-md text-headline-md">
                    U
                </div>
<div class="flex-1">
<p class="font-body-md text-body-md text-on-surface-variant">Signed in as</p>
<p class="font-body-lg text-body-lg text-on-surface">user@example.com</p>
</div>
</div>
<button class="mt-xs w-full bg-surface-container-highest hover:bg-surface-container-high active:opacity-70 transition-colors border border-outline-variant text-error rounded-lg py-sm px-md font-label-md text-label-md flex justify-center items-center gap-2">
<span class="material-symbols-outlined text-[18px]">logout</span>
                Sign out
            </button>
</section>
<!-- Sync Section -->
<section class="bg-surface-container rounded-xl border border-surface-container-highest p-md flex flex-col gap-sm">
<h2 class="font-headline-sm text-headline-sm text-on-surface">Data Sync</h2>
<div class="flex items-center justify-between">
<div>
<p class="font-body-md text-body-md text-on-surface-variant">Last sync: 2 mins ago</p>
<p class="font-body-md text-body-md text-secondary">pushed 3, pulled 1</p>
</div>
<button class="bg-primary-container text-on-primary-container hover:bg-primary-fixed active:opacity-70 transition-colors rounded-full p-sm flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">cloud_sync</span>
</button>
</div>
</section>
<!-- Settings Section -->
<section class="space-y-sm">
<h2 class="font-headline-sm text-headline-sm text-on-surface mb-md">Preferences</h2>
<div class="bg-surface-container rounded-xl border border-surface-container-highest divide-y divide-surface-container-highest">
<button class="w-full flex items-center justify-between p-md hover:bg-surface-container-high transition-colors text-left">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant">monitor_weight</span>
<span class="font-body-lg text-body-lg text-on-surface">Unit System</span>
</div>
<span class="font-body-md text-body-md text-primary">kg</span>
</button>
<button class="w-full flex items-center justify-between p-md hover:bg-surface-container-high transition-colors text-left">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant">timer</span>
<span class="font-body-lg text-body-lg text-on-surface">Default Rest Timer</span>
</div>
<span class="font-body-md text-body-md text-primary">90s</span>
</button>
<button class="w-full flex items-center justify-between p-md hover:bg-surface-container-high transition-colors text-left">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant">dark_mode</span>
<span class="font-body-lg text-body-lg text-on-surface">Theme</span>
</div>
<span class="font-body-md text-body-md text-primary">Deep Dark</span>
</button>
</div>
</section>

<span class="material-symbols-outlined mb-1">fitness_center</span>
<span class="opacity-0 h-0 overflow-hidden">Today</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant pt-1 hover:bg-surface-container-high dark:hover:bg-surface-container-high transition-colors active:scale-95 transition-transform duration-150 flex-1 h-full" href="#">
<span class="material-symbols-outlined mb-1">assignment</span>
<span class="opacity-0 h-0 overflow-hidden">Routines</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant pt-1 hover:bg-surface-container-high dark:hover:bg-surface-container-high transition-colors active:scale-95 transition-transform duration-150 flex-1 h-full" href="#">
<span class="material-symbols-outlined mb-1">history</span>
<span class="opacity-0 h-0 overflow-hidden">History</span>
</a>
<a class="flex flex-col items-center justify-center text-primary dark:text-primary border-t-2 border-primary pt-1 hover:bg-surface-container-high dark:hover:bg-surface-container-high transition-colors active:scale-95 transition-transform duration-150 flex-1 h-full" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">person</span>
<span>Profile</span>
</a>
</nav>

<span class="material-symbols-outlined">fitness_center</span> Today
        </a>
<a class="flex items-center gap-3 p-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high" href="#">
<span class="material-symbols-outlined">assignment</span> Routines
        </a>
<a class="flex items-center gap-3 p-3 rounded-lg text-on-surface-variant hover:bg-surface-container-high" href="#">
<span class="material-symbols-outlined">history</span> History
        </a>
<a class="flex items-center gap-3 p-3 rounded-lg bg-surface-container-highest text-primary font-bold" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span> Profile
        </a>
