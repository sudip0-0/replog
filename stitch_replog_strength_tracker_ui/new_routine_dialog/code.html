<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for a cleaner dark mode feel if content overflows */

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body-lg antialiased h-screen w-screen overflow-hidden relative flex items-center justify-center">
<!-- Mock background content to give context to the modal overlay -->
<div class="absolute inset-0 z-0 opacity-30 flex flex-col p-container-margin gap-lg pointer-events-none">
<div class="h-14 w-full border-b border-surface-container-highest flex items-center mb-md">
<div class="w-1/3 h-6 bg-surface-container-highest rounded"></div>
</div>
<div class="w-full h-32 bg-surface-container-low rounded-lg border border-surface-container-highest"></div>
<div class="w-full h-32 bg-surface-container-low rounded-lg border border-surface-container-highest"></div>
<div class="w-full h-32 bg-surface-container-low rounded-lg border border-surface-container-highest"></div>
</div>
<!-- Modal Overlay -->
<div class="absolute inset-0 bg-black/60 backdrop-blur-[2px] z-40 transition-opacity duration-300"></div>
<!-- Dialog Container -->
<main class="relative z-50 w-[calc(100%-32px)] max-w-[400px] bg-surface rounded-xl border border-surface-container-highest shadow-2xl flex flex-col overflow-hidden animate-[scaleIn_0.2s_ease-out]">
<!-- Dialog Header -->
<header class="px-lg pt-lg pb-sm">
<h1 class="font-headline-md text-headline-md text-on-surface">New routine</h1>
</header>
<!-- Dialog Content -->
<section class="px-lg py-sm">
<div class="flex flex-col gap-xs">
<label class="sr-only" for="routine-name">Routine Name</label>
<input autocomplete="off" autofocus="" class="w-full h-[48px] bg-surface-container-low text-on-surface font-body-lg text-body-lg px-md rounded border border-surface-container-highest focus:border-primary-container focus:ring-1 focus:ring-primary-container focus:outline-none placeholder:text-on-surface-variant transition-colors" id="routine-name" placeholder="Name" type="text"/>
</div>
</section>
<!-- Dialog Actions -->
<footer class="px-lg pb-lg pt-md flex justify-end items-center gap-sm mt-xs">
<button class="px-md py-[10px] rounded font-label-md text-label-md text-primary hover:bg-surface-container-highest transition-colors min-w-[80px] active:scale-95 duration-150">
                Cancel
            </button>
<button class="px-md py-[10px] rounded font-label-md text-label-md text-on-primary-container bg-primary-container hover:bg-primary-fixed transition-colors min-w-[80px] active:scale-95 duration-150">
                Create
            </button>
</footer>
</main>
<script>
        // Simple scale-in animation via Tailwind arbitrary values in CSS or just letting the class handle it.
        // Tailwind doesn't have a built in scaleIn, let's inject a quick style for it to make it feel premium.
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes scaleIn {
                from { transform: scale(0.95); opacity: 0; }
                to { transform: scale(1); opacity: 1; }
            }
        `;
        document.head.appendChild(style);

        // Auto-focus input on load for immediate interaction
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const input = document.getElementById('routine-name');
                if(input) input.focus();
            }, 100);
        });
    </script>
</body></html>
