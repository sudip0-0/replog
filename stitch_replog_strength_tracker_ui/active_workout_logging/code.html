<style>
        body {
            background-color: #090A0D;
            color: #e3e2e6;

        }

            width: 0px;
            background: transparent;
        }

        .perf-input {
            appearance: none;
            -webkit-appearance: none;

<body class="flex flex-col min-h-screen font-body-lg text-body-lg overflow-x-hidden">
<!-- TopAppBar Semantic Shell - Intent: Linear/Transactional (Active Workout) -> We keep it but modify for workflow context -->
<header class="bg-surface dark:bg-surface border-b border-outline-variant dark:border-outline-variant docked full-width top-0 sticky z-40">
<div class="flex justify-between items-center h-14 w-full px-md">
<button class="text-primary dark:text-primary hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors active:opacity-70 transition-opacity p-2 -ml-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex flex-col items-center">
<h1 class="font-headline-sm text-headline-sm text-primary dark:text-primary">Pull Day A</h1>
<span class="font-label-md text-label-md text-primary-container tabular-nums tracking-wider mt-0.5">24:15</span>
</div>
<button class="text-on-surface-variant dark:text-on-surface-variant hover:bg-surface-container-highest dark:hover:bg-surface-container-highest transition-colors active:opacity-70 transition-opacity p-2 -mr-2 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-container-margin py-md flex flex-col gap-sm pb-32">
<!-- Exercise Card 1: Bench Press -->
<article class="bg-[#181B22] border border-[#252A33] rounded-xl overflow-hidden flex flex-col">

<div class="px-md py-sm border-b border-[#252A33] flex justify-between items-start">
<div>
<h2 class="font-headline-sm text-headline-sm text-on-surface">Bench Press</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Pinky on rings</p>
</div>
<button class="text-on-surface-variant p-1 rounded-DEFAULT hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</button>
</div>
<!-- Sets Area -->
<div class="flex flex-col">
<!-- Column Headers -->
<div class="grid grid-cols-[32px_1fr_1fr_1fr_44px] gap-2 px-md py-xs font-label-md text-label-md text-on-surface-variant text-center items-center">
<div>Set</div>
<div>Prev</div>
<div>kg</div>
<div>Reps</div>
<div class="flex justify-center"><span class="material-symbols-outlined text-[16px]" data-icon="check">check</span></div>
</div>
<!-- Set 1 (Completed) -->
<div class="grid grid-cols-[32px_1fr_1fr_1fr_44px] gap-2 px-md py-1 items-center bg-[#181B22]">
<div class="flex justify-center">
<span class="font-label-md text-label-md text-on-surface-variant">1</span>
</div>
<div class="text-center font-body-md text-body-md text-on-surface-variant">80 x 8</div>
<div class="h-12 bg-surface rounded-lg border border-[#252A33] flex items-center justify-center">
<input class="perf-input bg-transparent w-full text-center font-data-lg text-data-lg text-on-surface focus:outline-none focus:border-primary-container border-transparent rounded-lg" type="number" value="80"/>
</div>
<div class="h-12 bg-surface rounded-lg border border-[#252A33] flex items-center justify-center">
<input class="perf-input bg-transparent w-full text-center font-data-lg text-data-lg text-on-surface focus:outline-none focus:border-primary-container border-transparent rounded-lg" type="number" value="8"/>
</div>
<button class="h-12 w-full rounded-lg bg-primary-container/20 border border-primary-container flex flex-col items-center justify-center text-primary-container active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]" data-icon="check">check</span>
</button>
</div>

</div>

<div class="h-12 bg-surface rounded-lg border border-[#252A33] flex items-center justify-center">

</div>
<button class="h-12 w-full rounded-lg bg-primary-container/20 border border-primary-container flex flex-col items-center justify-center text-primary-container active:scale-95 transition-transform">

</button>
</div>

<div class="flex justify-center">
<span class="font-label-md text-label-md text-primary-container bg-primary-container/10 px-1.5 py-0.5 rounded-DEFAULT">3</span>
</div>
<div class="text-center font-body-md text-body-md text-on-surface-variant">80 x 7</div>

</div>
</div>
</div>
</div>
<div class="px-md py-sm">

<div class="flex flex-col">

<div class="h-12 bg-surface rounded-lg border border-[#252A33] flex items-center justify-center">

<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>

</div>

<button class="w-full py-2 flex items-center justify-center gap-2 text-on-surface-variant font-label-md text-label-md rounded-lg hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="add">add</span>

<button class="w-full h-12 bg-surface-container-highest text-on-surface font-headline-sm text-headline-sm rounded-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="add">add</span>

        </button>
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline-sm text-headline-sm rounded-lg flex items-center justify-center active:scale-95 transition-transform shadow-[0_0_15px_rgba(245,197,66,0.2)]">
